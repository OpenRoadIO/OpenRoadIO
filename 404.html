<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>OpenRoadIO</title>
    <script type="text/javascript">
      // Your repository name is 'OR', so we keep the root segment
      // Current path structure: /OR/page-name
      // To redirect correctly, we need to keep only 1 segment (/OR/)
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.replace(/\?/g, '~q~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
